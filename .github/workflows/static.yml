<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Divide — Dual-Lens News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ────────────────────────────────────────────────── */
:root {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);

  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;

  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;
  --radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);

  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter','Helvetica Neue',sans-serif;
}

/* DARK MODE (default) */
[data-theme="dark"], :root {
  --color-bg:#0f0f10;
  --color-surface:#161618;
  --color-surface-2:#1c1c1e;
  --color-surface-offset:#232327;
  --color-divider:#2a2a2e;
  --color-border:#333338;
  --color-text:#e8e8ea;
  --color-text-muted:#8a8a90;
  --color-text-faint:#4a4a50;

  --color-right:#e84040;
  --color-right-dim:#3d1515;
  --color-right-mid:#7a1e1e;
  --color-right-text:#ffcece;
  --color-left:#4080e8;
  --color-left-dim:#0f1e3d;
  --color-left-mid:#1e3d7a;
  --color-left-text:#cce0ff;

  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);
  --shadow-md:0 4px 12px oklch(0 0 0/0.4);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}

[data-theme="light"] {
  --color-bg:#f5f5f0;
  --color-surface:#fafafa;
  --color-surface-2:#ffffff;
  --color-surface-offset:#ebebeb;
  --color-divider:#d8d8d8;
  --color-border:#c8c8c8;
  --color-text:#1a1a1c;
  --color-text-muted:#5a5a62;
  --color-text-faint:#aaaaae;

  --color-right:#cc2020;
  --color-right-dim:#ffe8e8;
  --color-right-mid:#ffd0d0;
  --color-right-text:#8a0000;
  --color-left:#1a5cc8;
  --color-left-dim:#e0ecff;
  --color-left-mid:#ccdeff;
  --color-left-text:#003080;

  --shadow-sm:0 1px 2px oklch(0.2 0 0/0.07);
  --shadow-md:0 4px 12px oklch(0.2 0 0/0.09);
  --shadow-lg:0 12px 32px oklch(0.2 0 0/0.13);
}

/* ── BASE ────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);overflow-x:hidden}
img{display:block;max-width:100%;height:auto}
a,button,[role="button"]{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive),box-shadow var(--transition-interactive)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
ul{list-style:none}
:focus-visible{outline:2px solid var(--color-left);outline-offset:3px;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── HEADER ─────────────────────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--color-surface);
  border-bottom:1px solid var(--color-border);
  box-shadow:var(--shadow-sm);
}
.header-inner{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:var(--space-3) var(--space-6);
  max-width:100%;
}
.header-left{display:flex;align-items:center;gap:var(--space-3)}
.header-right{display:flex;align-items:center;gap:var(--space-3);justify-content:flex-end}
.header-center{text-align:center}

/* SVG Logo */
.logo-link{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text)}
.logo-text{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  font-weight:700;
  letter-spacing:-0.02em;
  background:linear-gradient(90deg,var(--color-right) 0%,var(--color-text) 40%,var(--color-text) 60%,var(--color-left) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}

.live-badge{
  display:flex;align-items:center;gap:var(--space-1);
  font-size:var(--text-xs);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  color:#4ade80;background:rgba(74,222,128,0.1);
  padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);
  border:1px solid rgba(74,222,128,0.3);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 1.5s ease-in-out infinite}

.theme-toggle{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:var(--radius-full);
  color:var(--color-text-muted);
  border:1px solid var(--color-border);
}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-offset)}

.last-updated{font-size:var(--text-xs);color:var(--color-text-faint)}
.refresh-btn{
  display:flex;align-items:center;gap:var(--space-1);
  font-size:var(--text-xs);color:var(--color-text-muted);
  padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);
  border:1px solid var(--color-border);
}
.refresh-btn:hover{color:var(--color-text);background:var(--color-surface-offset)}
.refresh-btn svg{transition:transform 0.5s}
.refresh-btn.spinning svg{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── COLUMN HEADERS ──────────────────────────────────────────── */
.columns-header{
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--color-border);
  position:sticky;top:57px;z-index:90;background:var(--color-surface);
  align-items:stretch;
}
.col-head{
  display:flex;align-items:center;gap:var(--space-3);
  padding:var(--space-3) var(--space-6);
  font-size:var(--text-xs);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  min-height:64px;
}
.col-head.right-head{
  background:var(--color-right-dim);
  color:var(--color-right);
  border-right:1px solid var(--color-border);
}
.col-head.left-head{
  background:var(--color-left-dim);
  color:var(--color-left);
}
.col-head-icon{font-size:1rem}
.col-sources{
  display:flex;flex-wrap:wrap;gap:var(--space-1);margin-left:auto;
}
.source-chip{
  font-size:var(--text-xs);font-weight:500;
  padding:2px var(--space-2);border-radius:var(--radius-full);
  border:1px solid currentColor;opacity:0.7;
}

/* ── MAIN SPLIT LAYOUT ───────────────────────────────────────── */
.main-split{
  display:grid;grid-template-columns:1fr 1fr;
  height:calc(100vh - 120px);
  min-height:calc(100vh - 120px);
  overflow:hidden;
  align-items:stretch;
}
.news-col{
  padding:var(--space-6);
  overflow-y:auto;
  overflow-x:hidden;
  border-right:1px solid var(--color-border);
  height:100%;
  min-height:0;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
.news-col.left-col{border-right:none}

/* Divider line */
.main-split::before{
  content:'';
  position:absolute;left:50%;top:120px;bottom:0;width:1px;
  background:linear-gradient(to bottom,var(--color-right),var(--color-border) 30%,var(--color-border) 70%,var(--color-left));
  pointer-events:none;z-index:10;
}
.main-split{position:relative}

/* ── NEWS CARDS ──────────────────────────────────────────────── */
.news-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  margin-bottom:var(--space-4);
  overflow:hidden;
  animation:fadeIn 0.4s ease both;
  box-shadow:var(--shadow-sm);
  transition:box-shadow var(--transition-interactive),transform var(--transition-interactive);
}
.news-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}

.news-card.featured{
  border-radius:var(--radius-xl);
  margin-bottom:var(--space-6);
}
.news-card.featured .card-content{padding:var(--space-5)}

.card-content{padding:var(--space-4)}
.card-meta{
  display:flex;align-items:center;gap:var(--space-2);
  margin-bottom:var(--space-2);
  flex-wrap:wrap;
}
.card-source{
  font-size:var(--text-xs);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
}
.right-col .card-source{color:var(--color-right)}
.left-col .card-source{color:var(--color-left)}

.card-time{font-size:var(--text-xs);color:var(--color-text-faint)}
.card-title{
  font-family:var(--font-display);
  font-size:var(--text-base);
  font-weight:700;
  line-height:1.3;
  margin-bottom:var(--space-2);
  color:var(--color-text);
}
.news-card.featured .card-title{font-size:var(--text-lg)}
.card-title a{
  color:inherit;text-decoration:none;
}
.card-title a:hover{
  text-decoration:underline;text-decoration-color:var(--color-text-faint);
}
.card-snippet{
  font-size:var(--text-sm);color:var(--color-text-muted);
  line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-image{
  width:100%;aspect-ratio:16/9;object-fit:cover;
  background:var(--color-surface-offset);
}
.card-image-placeholder{
  width:100%;aspect-ratio:16/9;
  background:var(--color-surface-offset);
  display:flex;align-items:center;justify-content:center;
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-2) var(--space-4);
  border-top:1px solid var(--color-divider);
  background:var(--color-surface-2);
}
.read-more{
  font-size:var(--text-xs);font-weight:600;
  text-decoration:none;
  display:flex;align-items:center;gap:4px;
}
.right-col .read-more{color:var(--color-right)}
.left-col .read-more{color:var(--color-left)}
.read-more:hover{opacity:0.7}

/* Bias label strip */
.bias-strip{
  height:3px;width:100%;
}
.right-col .bias-strip{background:linear-gradient(90deg,var(--color-right-mid),var(--color-right))}
.left-col .bias-strip{background:linear-gradient(90deg,var(--color-left),var(--color-left-mid))}

/* ── SKELETON ────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface-2) 50%,var(--color-surface-offset) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s ease-in-out infinite;
  border-radius:var(--radius-sm);
}
.skel-card{
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  margin-bottom:var(--space-4);
  overflow:hidden;
}
.skel-img{width:100%;aspect-ratio:16/9}
.skel-body{padding:var(--space-4)}
.skel-line{height:1em;margin-bottom:var(--space-2);border-radius:var(--radius-sm)}
.skel-line.short{width:40%}
.skel-line.med{width:70%}

/* ── SECTION LABEL ───────────────────────────────────────────── */
.section-label{
  font-size:var(--text-xs);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--color-text-faint);
  margin-bottom:var(--space-4);
  padding-bottom:var(--space-2);
  border-bottom:1px solid var(--color-divider);
}

/* ── TOPIC FILTERS ───────────────────────────────────────────── */
.topic-filters{
  display:flex;gap:var(--space-2);flex-wrap:wrap;
  margin-bottom:var(--space-5);
}
.topic-btn{
  font-size:var(--text-xs);font-weight:600;
  padding:var(--space-1) var(--space-3);
  border-radius:var(--radius-full);
  border:1px solid var(--color-border);
  color:var(--color-text-muted);
  background:transparent;
}
.topic-btn:hover,.topic-btn.active{color:var(--color-text);background:var(--color-surface-offset);border-color:var(--color-text-faint)}
.right-col .topic-btn.active{color:var(--color-right);border-color:var(--color-right);background:var(--color-right-dim)}
.left-col .topic-btn.active{color:var(--color-left);border-color:var(--color-left);background:var(--color-left-dim)}

/* ── FOOTER ──────────────────────────────────────────────────── */
.site-footer{
  text-align:center;padding:var(--space-8);
  color:var(--color-text-faint);font-size:var(--text-xs);
  border-top:1px solid var(--color-border);
}

/* ── ERROR STATE ─────────────────────────────────────────────── */
.error-state{
  text-align:center;padding:var(--space-12) var(--space-4);
  color:var(--color-text-muted);
}
.error-state p{margin-top:var(--space-2);font-size:var(--text-sm)}

/* ── MOBILE ──────────────────────────────────────────────────── */
@media(max-width:768px){
  html,body{overflow:auto}
  body{font-size:16px}
  .site-header{position:sticky;top:0}
  .header-inner{grid-template-columns:1fr auto;gap:var(--space-3);padding:var(--space-3) var(--space-4)}
  .header-left{gap:var(--space-2);min-width:0;flex-wrap:wrap}
  .header-center{grid-column:1 / -1;order:-1;text-align:left}
  .header-right{display:flex;justify-content:flex-end;gap:var(--space-2)}
  .logo-text{font-size:clamp(1.4rem,1.1rem + 2vw,2rem)}
  .logo-sub{font-size:12px}
  .live-badge,.refresh-btn,.theme-toggle{min-height:44px}
  .refresh-btn{padding:0.7rem 0.9rem}
  .theme-toggle{width:44px;height:44px}
  .columns-header{grid-template-columns:1fr;position:static}
  .col-head{padding:var(--space-3) var(--space-4);align-items:flex-start;flex-direction:column}
  .col-head.right-head{border-right:none;border-bottom:1px solid var(--color-border)}
  .col-sources{margin-left:0;margin-top:var(--space-2)}
  .main-split{grid-template-columns:1fr;height:auto;min-height:auto;overflow:visible}
  .news-col{padding:var(--space-4);border-right:none;border-bottom:1px solid var(--color-border);height:auto;max-height:none;overflow:visible}
  .main-split::before{display:none}
  .topic-filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:var(--space-2);scrollbar-width:none}
  .topic-filters::-webkit-scrollbar{display:none}
  .topic-btn{white-space:nowrap;min-height:44px;padding:0.65rem 0.95rem}
  .news-card{margin-bottom:var(--space-3)}
  .news-card.featured{margin-bottom:var(--space-4)}
  .card-content{padding:var(--space-4)}
  .card-footer{padding:var(--space-3) var(--space-4);gap:var(--space-2);align-items:flex-start;flex-direction:column}
  .read-more{min-height:44px;display:inline-flex;align-items:center}
  .card-title{font-size:1.05rem}
  .news-card.featured .card-title{font-size:1.22rem}
}

@media(max-width:420px){
  .header-left{align-items:flex-start}
  .last-updated{width:100%}
  .col-head{padding:var(--space-3)}
  .news-col{padding:var(--space-3)}
  .card-source,.card-time{font-size:12px}
  .card-snippet{font-size:14px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <span class="live-badge"><span class="live-dot"></span>Live</span>
      <span class="last-updated" id="lastUpdated">Fetching feeds…</span>
    </div>
    <div class="header-center">
      <a href="#" class="logo-link">
        <span>
          <div class="logo-text">THE DIVIDE</div>
          <div class="logo-sub">Dual-Perspective News</div>
        </span>
      </a>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="fetchAllFeeds()" aria-label="Refresh feeds">
        <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

</header>

<!-- COLUMN HEADERS -->
<div class="columns-header">
  <div class="col-head left-head">
    <span class="col-head-icon">🔵</span>
    <span>Left-Leaning</span>
    <div class="col-sources">
      <span class="source-chip">Guardian</span>
      <span class="source-chip">NPR</span>
      <span class="source-chip">CNN</span>
      <span class="source-chip">Vox</span>
    </div>
  </div>
  <div class="col-head right-head">
    <span class="col-head-icon">🔴</span>
    <span>Right-Leaning</span>
    <div class="col-sources">
      <span class="source-chip">Fox News</span>
      <span class="source-chip">Breitbart</span>
      <span class="source-chip">NY Post</span>
      <span class="source-chip">Daily Wire</span>
    </div>
  </div>
</div>

<main class="main-split">
  <!-- LEFT WING COLUMN -->
  <section class="news-col left-col" id="leftCol">
    <div class="topic-filters" id="leftFilters">
      <button class="topic-btn active" onclick="filterCol('left','all',this)">All</button>
      <button class="topic-btn" onclick="filterCol('left','politics',this)">Politics</button>
      <button class="topic-btn" onclick="filterCol('left','economy',this)">Economy</button>
      <button class="topic-btn" onclick="filterCol('left','world',this)">World</button>
    </div>
    <div class="section-label">🔵 Progressive Perspective</div>
    <div id="leftFeed"></div>
  </section>

  <!-- RIGHT WING COLUMN -->
  <section class="news-col right-col" id="rightCol">
    <div class="topic-filters" id="rightFilters">
      <button class="topic-btn active" onclick="filterCol('right','all',this)">All</button>
      <button class="topic-btn" onclick="filterCol('right','politics',this)">Politics</button>
      <button class="topic-btn" onclick="filterCol('right','economy',this)">Economy</button>
      <button class="topic-btn" onclick="filterCol('right','world',this)">World</button>
    </div>
    <div class="section-label">🔴 Conservative Perspective</div>
    <div id="rightFeed"></div>
  </section>
</main>

<footer class="site-footer">
  <p>THE DIVIDE — Real news, dual perspectives. Sources fetched live via RSS. All content belongs to original publishers.</p>
  <p style="margin-top:var(--space-2)">No endorsement of any political viewpoint is implied.</p>
</footer>

<script>
// ── THEME TOGGLE ────────────────────────────────────────────────
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d='dark';
  r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'?
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });
})();

// ── RSS SOURCES ─────────────────────────────────────────────────
// Using rss2json.com as a CORS proxy for RSS feeds (free, no-key needed for basic use)
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

const SOURCES = {
  right: [
    { name:'Fox News', url:'https://moxie.foxnews.com/google-publisher/latest.xml', color:'#e84040' },
    { name:'NY Post',  url:'https://nypost.com/feed/', color:'#c8282a' },
    { name:'Breitbart',url:'https://feeds.feedburner.com/breitbart', color:'#d44000' },
    { name:'Daily Wire',url:'https://www.dailywire.com/feeds/rss.xml', color:'#b03000' },
  ],
  left: [
    { name:'The Guardian', url:'https://www.theguardian.com/world/rss', color:'#4080e8' },
    { name:'NPR',          url:'https://feeds.npr.org/1001/rss.xml', color:'#1e5dbe' },
    { name:'CNN',          url:'http://rss.cnn.com/rss/cnn_topstories.rss', color:'#2456c7' },
    { name:'Vox',          url:'https://www.vox.com/rss/index.xml', color:'#2040a0' },
  ]
};

let allArticles = { right: [], left: [] };
let activeFilters = { right: 'all', left: 'all' };

// ── HELPERS ─────────────────────────────────────────────────────
function timeAgo(dateStr) {
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    const diff = Math.floor((Date.now() - d) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.floor(diff/60) + 'h ago';
    return Math.floor(diff/1440) + 'd ago';
  } catch { return ''; }
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent || tmp.innerText || '';
}

function matchesTopic(item, topic) {
  if (topic === 'all') return true;
  const keywords = {
    politics: ['trump','biden','congress','senate','election','vote','republican','democrat','president','white house','political'],
    economy: ['economy','inflation','gdp','market','stock','trade','tariff','jobs','unemployment','fed','interest rate','fiscal'],
    world: ['ukraine','russia','china','israel','gaza','europe','nato','war','conflict','international','global','foreign']
  };
  const text = ((item.title||'') + ' ' + (item.description||'')).toLowerCase();
  return (keywords[topic] || []).some(kw => text.includes(kw));
}

// ── RENDER SKELETONS ─────────────────────────────────────────────
function renderSkeletons(feedId, count=4) {
  const el = document.getElementById(feedId);
  el.innerHTML = Array(count).fill('').map((_,i) => `
    <div class="skel-card" style="animation-delay:${i*0.08}s">
      <div class="skel-img skeleton"></div>
      <div class="skel-body">
        <div class="skel-line short skeleton"></div>
        <div class="skel-line skeleton"></div>
        <div class="skel-line med skeleton"></div>
      </div>
    </div>
  `).join('');
}

// ── RENDER ARTICLES ──────────────────────────────────────────────
function renderArticles(side, articles) {
  const feedId = side === 'right' ? 'rightFeed' : 'leftFeed';
  const el = document.getElementById(feedId);
  const topic = activeFilters[side];
  const filtered = articles.filter(a => matchesTopic(a, topic));

  if (!filtered.length) {
    el.innerHTML = `<div class="error-state"><div style="font-size:2rem">📭</div><p>No articles found for this topic.<br>Try a different filter.</p></div>`;
    return;
  }

  el.innerHTML = filtered.map((item, i) => {
    const sourceName = item._source || '';
    const sourceColor = item._sourceColor || (side==='right'?'#e84040':'#4080e8');
    const snippet = stripHtml(item.description).slice(0,180).trim();
    const hasImage = item.enclosure?.link || item.thumbnail;
    const imgSrc = item.enclosure?.link || item.thumbnail || '';
    const validImg = imgSrc && (imgSrc.startsWith('http://') || imgSrc.startsWith('https://'));
    const featured = i === 0;

    return `
      <article class="news-card${featured?' featured':''}" style="animation-delay:${i*0.05}s">
        <div class="bias-strip"></div>
        ${validImg ? `<img class="card-image" src="${imgSrc}" alt="${item.title||''}" loading="lazy" width="600" height="337" onerror="this.style.display='none'">` : ''}
        <div class="card-content">
          <div class="card-meta">
            <span class="card-source" style="color:${sourceColor}">${sourceName}</span>
            <span class="card-time">${timeAgo(item.pubDate)}</span>
          </div>
          <h2 class="card-title">
            <a href="${item.link||'#'}" target="_blank" rel="noopener noreferrer">${item.title||'Untitled'}</a>
          </h2>
          ${snippet ? `<p class="card-snippet">${snippet}…</p>` : ''}
        </div>
        <div class="card-footer">
          <a class="read-more" href="${item.link||'#'}" target="_blank" rel="noopener noreferrer">
            Read full article
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M7 7h10v10"/></svg>
          </a>
          <span style="font-size:var(--text-xs);color:var(--color-text-faint)">${item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</span>
        </div>
      </article>
    `;
  }).join('');
}

// ── FETCH ONE RSS FEED ───────────────────────────────────────────
async function fetchFeed(source) {
  const url = RSS2JSON + encodeURIComponent(source.url) + '&count=10';
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.status !== 'ok' || !data.items) return [];
    return data.items.map(item => ({ ...item, _source: source.name, _sourceColor: source.color }));
  } catch(e) {
    console.warn('Feed failed:', source.name, e.message);
    return [];
  }
}

// ── FETCH ALL FEEDS ───────────────────────────────────────────────
async function fetchAllFeeds() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('spinning');

  renderSkeletons('rightFeed', 4);
  renderSkeletons('leftFeed', 4);

  const [rightResults, leftResults] = await Promise.all([
    Promise.all(SOURCES.right.map(fetchFeed)),
    Promise.all(SOURCES.left.map(fetchFeed))
  ]);

  // Merge, shuffle-interleave by source, sort by date
  const merge = (groups) => {
    const all = groups.flat();
    all.sort((a, b) => {
      try { return new Date(b.pubDate) - new Date(a.pubDate); }
      catch { return 0; }
    });
    return all;
  };

  allArticles.right = merge(rightResults);
  allArticles.left  = merge(leftResults);

  // Fallback: if all fetches fail, show message
  const totalRight = allArticles.right.length;
  const totalLeft  = allArticles.left.length;

  if (!totalRight) {
    document.getElementById('rightFeed').innerHTML = `<div class="error-state"><div style="font-size:2rem">⚠️</div><p>Could not load right-leaning feeds.<br>Check your connection or try refreshing.</p></div>`;
  } else {
    renderArticles('right', allArticles.right);
  }

  if (!totalLeft) {
    document.getElementById('leftFeed').innerHTML = `<div class="error-state"><div style="font-size:2rem">⚠️</div><p>Could not load left-leaning feeds.<br>Check your connection or try refreshing.</p></div>`;
  } else {
    renderArticles('left', allArticles.left);
  }

  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    'Updated ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  btn.classList.remove('spinning');
}

// ── TOPIC FILTER ─────────────────────────────────────────────────
function filterCol(side, topic, btn) {
  activeFilters[side] = topic;
  const filtersId = side === 'right' ? 'rightFilters' : 'leftFilters';
  document.querySelectorAll('#'+filtersId+' .topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles(side, allArticles[side]);
}

// ── AUTO REFRESH (every 5 minutes) ───────────────────────────────
fetchAllFeeds();
setInterval(fetchAllFeeds, 5 * 60 * 1000);
</script>
</body>
</html>
